name: tv_track
description: "Suivi perso de séries et films (remplaçant TV Time)."
publish_to: 'none'
version: 0.4.4+1

environment:
  sdk: ^3.12.0

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.6.0
  collection: ^1.19.1
  dio: ^5.10.0
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_localizations:
    sdk: flutter
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  hooks_riverpod: ^3.3.2
  intl: ^0.20.2
  json_annotation: ^4.12.0
  riverpod_annotation: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  # Icône adaptative Android : fond charbon de la marque + symbole en avant-plan.
  adaptive_icon_background: "#12100D"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
