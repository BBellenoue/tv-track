# CI Codemagic : build Android + publication Firebase App Distribution
# à chaque push sur main (= merge de MR).
#
# Le repo est public : AUCUN fichier de config Firebase ni keystore n'est
# commité. Tout est injecté depuis le groupe de variables Codemagic "firebase" :
#   FIREBASE_ANDROID_APP_ID     app ID Android Firebase
#   GOOGLE_SERVICES_JSON        base64 de android/app/google-services.json  (secure)
#   FIREBASE_OPTIONS_DART       base64 de lib/firebase_options.dart         (secure)
#   ANDROID_KEYSTORE            base64 du keystore release                  (secure)
#   ANDROID_KEYSTORE_PASSWORD   mot de passe du keystore                    (secure)
#   FIREBASE_SERVICE_ACCOUNT    JSON du service account App Distribution    (secure)
workflows:
  android-release:
    name: Android → Firebase App Distribution
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      groups:
        - firebase
      flutter: stable
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Injecter la config Firebase et le keystore (non commités)
        script: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
          echo "$ANDROID_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/tv_track.keystore"
          cat >> $CM_ENV <<EOF
          CM_KEYSTORE_PATH=$CM_BUILD_DIR/tv_track.keystore
          CM_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
          CM_KEY_ALIAS=tvtrack
          CM_KEY_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
          EOF
      - name: Dépendances + codegen
        script: |
          flutter pub get
          dart run build_runner build
      - name: Tests
        script: flutter test
      - name: Build APK release
        script: flutter build apk --release --build-number=$PROJECT_BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        android:
          app_id: $FIREBASE_ANDROID_APP_ID
          groups:
            - perso
          artifact_type: apk
